<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flipkart Secondary Header</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="./assets/css/main.css" />
  </head>
  <body>
    <header class="header">
      <div class="header-logo">
        <img
          height="40px"
          width="160px"
          src="https://static-assets-web.flixcart.com/batman-returns/batman-returns/p/images/fkheaderlogo_exploreplus-11f9e2.svg"
          alt=""
        />
      </div>
      <div class="header-search">
        <svg
          width="24"
          height="24"
          class=""
          viewBox="0 0 24 24"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <title>Search Icon</title>
          <path
            d="M10.5 18C14.6421 18 18 14.6421 18 10.5C18 6.35786 14.6421 3 10.5 3C6.35786 3 3 6.35786 3 10.5C3 14.6421 6.35786 18 10.5 18Z"
            stroke="#717478"
            stroke-width="1.4"
            stroke-linecap="round"
            stroke-linejoin="round"
          ></path>
          <path
            d="M16 16L21 21"
            stroke="#717478"
            stroke-width="1.4"
            stroke-linecap="round"
            stroke-linejoin="round"
          ></path>
        </svg>
        <input
          type="searchs"
          placeholder="Search for Products, Brands and More"
        />
      </div>
      <div class="header-login">
        <img
          src="https://static-assets-web.flixcart.com/batman-returns/batman-returns/p/images/profile-6bae67.svg"
          alt=""
        />
        <select name="" id="">
          <option value="">Login</option>
        </select>
      </div>
      <div class="header-cart-seller">
        <img
          src="https://static-assets-web.flixcart.com/batman-returns/batman-returns/p/images/header_cart-43eb4e.svg"
          alt=""
        />
        <span>Cart</span>
      </div>
      <div class="header-cart-seller">
        <img
          src="https://static-assets-web.flixcart.com/batman-returns/batman-returns/p/images/Store-134a49.svg"
          alt=""
        />
        <span>Become a Seller </span>
      </div>
      <div>
        <img
          src="https://static-assets-web.flixcart.com/batman-returns/batman-returns/p/images/header_3verticalDots-c2bef0.svg"
          alt=""
        />
      </div>
    </header>

    <main>
      <section class="all-category-section">
        <div class="all-category">
          <a href="#">
            <div class="category-type">
              <div>
                <img
                  src="https://rukminim2.flixcart.com/fk-p-flap/64/64/image/e00302d428f5c7be.png?q=100"
                  alt=""
                />
              </div>
              <span>Minutes</span>
            </div>
          </a>
          <a href="#">
            <div class="category-type">
              <div>
                <img
                  src="https://rukminim2.flixcart.com/fk-p-flap/64/64/image/5f2ee7f883cdb774.png?q=100"
                  alt=""
                />
              </div>
              <span>Mobiles & Tablets</span>
            </div>
          </a>
          <a href="#">
            <div class="category-type">
              <div>
                <img
                  src="https://rukminim2.flixcart.com/fk-p-flap/64/64/image/ff559cb9d803d424.png?q=100"
                  alt=""
                />
              </div>
              <span>Fashion</span>
            </div>
          </a>
          <a href="#">
            <div class="category-type">
              <div>
                <img
                  src="https://rukminim2.flixcart.com/fk-p-flap/64/64/image/af646c36d74c4be9.png?q=100"
                  alt=""
                />
              </div>
              <span>Electronics</span>
            </div>
          </a>
          <a href="#">
            <div class="category-type">
              <div>
                <img
                  src="https://rukminim2.flixcart.com/fk-p-flap/64/64/image/e90944802d996756.jpg?q=100"
                  alt=""
                />
              </div>
              <span>TVs & Appliances</span>
            </div>
          </a>
          <a href="#">
            <div class="category-type">
              <div>
                <img
                  src="https://rukminim2.flixcart.com/fk-p-flap/64/64/image/1788f177649e6991.png?q=100"
                  alt=""
                />
              </div>
              <span>Home & Furniture</span>
            </div>
          </a>
          <a href="#">
            <div class="category-type">
              <div>
                <img
                  src="https://rukminim2.flixcart.com/fk-p-flap/64/64/image/3c647c2e0d937dc5.png?q=100"
                  alt=""
                />
              </div>
              <span>Flight Bookings</span>
            </div>
          </a>
          <a href="#">
            <div class="category-type">
              <div>
                <img
                  src="https://rukminim2.flixcart.com/fk-p-flap/64/64/image/b3020c99672953b9.png?q=100"
                  alt=""
                />
              </div>
              <span>Beauty, Food..</span>
            </div>
          </a>
          <a href="#">
            <div class="category-type">
              <div>
                <img
                  src="https://rukminim2.flixcart.com/fk-p-flap/64/64/image/e730a834ad950bae.png?q=100"
                  alt=""
                />
              </div>
              <span>Grocery</span>
            </div>
          </a>
        </div>
      </section>
    </main>
    <footer>
      <hr />
    </footer>
  </body>
</html>
