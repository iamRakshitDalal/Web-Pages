<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>People Panel</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="assets/style/style.css" />
  </head>
  <body>
    <!-- People icon when main card is hidden -->
    <i id="people" class="fa-solid fa-users"></i>

    <main>
      <!-- Main Card -->
      <div class="card" id="main-card-close">
        <div class="people-and-buttons">
          <h5>People</h5>
          <div><i class="fa-solid fa-xmark" id="close-main-card"></i></div>
        </div>
        <div class="people-and-buttons">
          <button type="button" class="add-button">
            <i class="fa-solid fa-microphone-lines-slash"></i>All muted
          </button>
          <button id="openCardBtn" type="button" class="add-button">
            <i class="fa-solid fa-user-plus"></i>Add people
          </button>
        </div>

        <div class="search-section">
          <i class="fa-brands fa-sistrix"></i>
          <input type="search" id="search" placeholder="Search for people" />
        </div>

        <h3 class="in-the-meet">In the meeting</h3>
        <div class="all-contributer">
          <div class="contributer-Section" id="see-contributer">
            <span>Contributor</span>
            <div class="contributer-Section-inner">
              <span id="total-user">1</span>
              <div><i class="fa-solid fa-chevron-up" id="icon"></i></div>
            </div>
          </div>
          <div id="users"></div>
        </div>
      </div>

      <!-- Add User Modal -->
      <div id="myCard" class="add-user-card">
        <div class="card-content">
          <h3>Add User</h3>
          <input type="text" id="userNameInput" placeholder="Enter your name" />
          <button type="button" class="card-button" id="addUserBtn">Add</button>
          <button type="button" class="card-button" id="closeCardBtn">
            Close
          </button>
        </div>
      </div>
    </main>

    <script src="assets/javaScript/script.js"></script>
  </body>
</html>
